<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="top-bar">
      <h1 class="logo">Recipe Finder</h1>
      <div class="controls">
        <select id="sortSelect">
          <option value="default">Sort Recipes</option>
          <option value="ratingHigh">Rating: High to Low</option>
          <option value="ratingLow">Rating: Low to High</option>
        </select>

        <select id="mealTypeSelect">
          <option value="All">All Meals</option>
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch">Lunch</option>
          <option value="Snack">Snack</option>
          <option value="Dinner">Dinner</option>
        </select>

        <input type="text" id="searchInput" placeholder="Enter recipe name">

        <button id="searchButton">Search</button>
        <button class = "resetButton" id="resetButton">Reset</button>
        <button id="themeToggle">🌙</button>
      </div>
    </header>
    <p id="loading" class="hidden">Loading.....</p>

    <div id="recipeContainer"></div>

    <div id="recipeModal" class="modal">
      <div class="modal-content">
        <span id="closeModal">&times;</span>
        <h2 id="modalTitle"></h2>
        <img id="modalImage">

        <h3>Ingredients</h3> 
        <ul id="modalIngredients"></ul>

        <h3>Instructions</h3>
        <p id="modalInstructions"></p>

      </div>
    </div>

    
    <script src="script.js"></script>
  </body>
</html>
